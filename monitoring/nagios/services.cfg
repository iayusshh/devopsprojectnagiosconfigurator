# =============================================================================
# Nagios Service Definitions — Self-Monitoring
# Monitor the Nagios Config Generator web UI and system resources
# =============================================================================

define service {
    host_name               nagiosgen-server
    service_description     NagiosGen Web UI (HTTP)
    check_command           check_http!-p 5000
    max_check_attempts      4
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    contact_groups          admins
}

define service {
    host_name               nagiosgen-server
    service_description     NagiosGen Process Check
    check_command           check_procs!1:!1:!gunicorn
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   15
    notification_period     24x7
    contact_groups          admins
}

define service {
    host_name               nagiosgen-server
    service_description     Disk Usage
    check_command           check_disk!20%!10%!/
    max_check_attempts      3
    check_interval          15
    retry_interval          5
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    contact_groups          admins
}

define service {
    host_name               nagiosgen-server
    service_description     CPU Load
    check_command           check_load!5.0,4.0,3.0!10.0,8.0,6.0
    max_check_attempts      3
    check_interval          10
    retry_interval          3
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    contact_groups          admins
}
