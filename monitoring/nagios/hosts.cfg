# =============================================================================
# Nagios Host Definitions — Self-Monitoring
# Monitor the Nagios Config Generator tool itself
# =============================================================================

define host {
    host_name               nagiosgen-server
    alias                   Nagios Config Generator Server
    address                 127.0.0.1
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    check_command           check-host-alive
    contact_groups          admins
}
